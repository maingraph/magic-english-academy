name: Platform CI

on:
  pull_request:
    paths:
      - "platform/**"
      - ".github/workflows/platform-ci.yml"
  push:
    branches:
      - main
    paths:
      - "platform/**"
      - ".github/workflows/platform-ci.yml"

jobs:
  checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: platform/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
