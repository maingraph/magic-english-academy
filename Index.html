    <div class="login-wrapper">
        <div class="login-container">
            <div class="logo">Magic English</div>
            
            <form class="login-form">
                <h2>Вход в аккаунт</h2>
                
                <!-- Блок для сообщения об ошибке -->
                <div id="error-message" class="error-message" style="display: none;"></div>
                
                <div class="input-group">
                    <label for="username">Логин</label>
                    <input type="text" id="username" placeholder="Введите ваш логин" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" placeholder="Введите ваш пароль" required>
                </div>
                
                <button type="submit" class="btn">Войти</button>
                
                <div class="register-link">
                    Нет аккаунта? <a href="https://magic-english-plan.tilda.ws/" target="_blank">Купить доступ</a>
                </div>
